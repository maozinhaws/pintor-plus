<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="6" dy="8" stdDeviation="4" flood-color="#111111" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Battlements (3 castle blocks at top — dark) -->
  <rect x="22" y="0" rx="6" ry="6" width="38" height="34" fill="#1a1a1a"/>
  <rect x="70" y="0" rx="6" ry="6" width="38" height="34" fill="#1a1a1a"/>
  <rect x="118" y="0" rx="6" ry="6" width="38" height="34" fill="#1a1a1a"/>

  <!-- Main shield body (with shadow) -->
  <rect x="10" y="20" rx="22" ry="22" width="174" height="168" fill="#1a1a1a" transform="translate(8,9)"/>
  <rect x="10" y="20" rx="22" ry="22" width="174" height="168" fill="url(#purpleGrad)"/>

  <!-- Cover battlement base (blend into shield top) -->
  <rect x="10" y="20" rx="0" ry="0" width="174" height="28" fill="url(#purpleGrad)"/>

  <!-- P letter — white outer shape (vertical stem + bowl) -->
  <!-- Stem -->
  <rect x="32" y="50" rx="8" ry="8" width="30" height="116" fill="white"/>
  <!-- Top connector -->
  <rect x="32" y="50" rx="8" ry="8" width="98" height="28" fill="white"/>
  <!-- Bowl right side -->
  <rect x="104" y="50" rx="14" ry="14" width="30" height="72" fill="white"/>
  <!-- Bottom connector of bowl -->
  <rect x="32" y="94" rx="8" ry="8" width="102" height="28" fill="white"/>

  <!-- P inner cutout (purple) — creates the P letter effect -->
  <!-- Inner stem cutout -->
  <rect x="44" y="64" rx="5" ry="5" width="18" height="88" fill="#7c2db9"/>
  <!-- Inner top cutout -->
  <rect x="44" y="64" rx="5" ry="5" width="74" height="18" fill="#7c2db9"/>
  <!-- Inner bowl right -->
  <rect x="104" y="64" rx="8" ry="8" width="16" height="46" fill="#7c2db9"/>
  <!-- Inner bottom bowl cutout -->
  <rect x="44" y="108" rx="5" ry="5" width="76" height="16" fill="#7c2db9"/>

  <!-- Second nested white ring (inner detail) -->
  <!-- Thin white line inside the purple — creates depth -->
  <rect x="52" y="72" rx="3" ry="3" width="60" height="6" fill="white" opacity="0.45"/>
  <rect x="52" y="72" rx="3" ry="3" width="6" height="36" fill="white" opacity="0.45"/>
  <rect x="108" y="72" rx="5" ry="5" width="6" height="32" fill="white" opacity="0.45"/>
  <rect x="52" y="114" rx="3" ry="3" width="62" height="6" fill="white" opacity="0.45"/>
</svg>
